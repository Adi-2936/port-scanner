<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Port Scanner</title>
        <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="header">
            <div class="logo">PS</div>
            <div>
                <h1>PORT SCANNER</h1>
                <div class="subtitle">Network Recon & Service Detection Tool</div>
            </div>
            <div style="margin-left:auto; font-size:11px; color:#7d8590;">
                <span class="status-dot"></span>ready
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">Scan Configuration</div>
            <div class="form-row">
                <div>
                    <label>Target Host / IP</label>
                    <input type="text" placeholder="192.168.1.1 or scanme.nmap.org" id="host" value="127.0.0.1">
                </div>
                <div>
                    <label>Threads</label>
                    <input type="number" placeholder="100" id="threads" value="100" min="1" max="500">
                </div>
            </div>
            <button class="btn" onclick="startScan()">▶ Run Scan</button>
            <div style="display: flex; gap: 12px; align-items: center; margin-top: 12px;">
                <div style="font-size: 11px; color: #7d8590; min-width: 70px;">Scan Progress</div>
                <div class="progress-bar" style="flex: 1;">
                    <div class="progress-fill" id="scan-prog"></div>
                </div>
                <div id="scan-counter" style="font-size: 11px; color: #7d8590; min-width: 50px; text-align: right;">—</div>
            </div>
            
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #30363d;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                    <div>
                        <label>Benchmark Port Range</label>
                        <input type="text" placeholder="1-200" id="benchmarkPortRange" value="1-200">
                    </div>
                    <div>
                        <label>Benchmark Threads</label>
                        <input type="number" placeholder="100" id="benchmarkThreads" value="100" min="1" max="500">
                    </div>
                </div>
            </div>
            
            <button class="btn btn-outline" onclick="runBenchmark()" style="margin-top: 12px;">⚡ Run Benchmark</button>
            <div style="display: flex; gap: 12px; align-items: center; margin-top: 12px;">
                <div style="font-size: 11px; color: #7d8590; min-width: 70px;">Benchmark</div>
                <div class="progress-bar" style="flex: 1;">
                    <div class="progress-fill" id="benchmark-prog"></div>
                </div>
                <div id="benchmark-counter" style="font-size: 11px; color: #7d8590; min-width: 50px; text-align: right;">—</div>
            </div>
        </div>

        <div class="metrics">
            <div class="metric">
                <div class="metric-label">Open Ports</div>
                <div class="metric-value" id="m-open">—</div>
                <div class="metric-sub">detected</div>
            </div>
            <div class="metric">
                <div class="metric-label">Ports Scanned</div>
                <div class="metric-value" id="m-total">—</div>
                <div class="metric-sub">total</div>
            </div>
            <div class="metric">
                <div class="metric-label">Duration</div>
                <div class="metric-value" id="m-time">—</div>
                <div class="metric-sub">seconds</div>
            </div>
            <div class="metric">
                <div class="metric-label">Throughput</div>
                <div class="metric-value" id="m-rate">—</div>
                <div class="metric-sub">ports/sec</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">Scan Results</div>
            <div id="results-area">
                <div class="empty-state">run a scan to see results here</div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
